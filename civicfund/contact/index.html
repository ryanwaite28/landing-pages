<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — CivicFund</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-white text-gray-900">

  <nav class="border-b border-gray-100">
    <div class="max-w-5xl mx-auto px-6 flex items-center justify-between h-16">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-green-600 flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <span class="font-semibold text-gray-900 text-lg tracking-tight">CivicFund</span>
      </a>
      <a href="index.html" class="text-sm text-gray-500 hover:text-gray-900 transition-colors">← Back to home</a>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-6 py-20">

    <h1 class="text-4xl font-bold text-gray-900 mb-3">Contact us</h1>
    <p class="text-lg text-gray-500 mb-12">Have a question or want to get in touch? We'd love to hear from you.</p>

    <div class="grid sm:grid-cols-1 gap-5 mb-16">
      <!-- <div class="bg-green-50 border border-green-100 rounded-2xl p-6">
        <p class="text-sm font-medium text-green-700 mb-1">General inquiries</p>
        <a href="mailto:hello@civicfund.us" class="text-gray-900 font-medium hover:text-green-700 transition-colors">hello@civicfund.us</a>
      </div> -->
      <div class="bg-gray-50 border border-gray-100 rounded-2xl p-6">
        <p class="text-sm font-medium text-gray-500 mb-1">Support</p>
        <a href="mailto:support@civicfund.us" class="text-gray-900 font-medium hover:text-green-700 transition-colors">support@civicfund.us</a>
      </div>
      <!-- <div class="bg-gray-50 border border-gray-100 rounded-2xl p-6">
        <p class="text-sm font-medium text-gray-500 mb-1">Press & media</p>
        <a href="mailto:press@civicfund.us" class="text-gray-900 font-medium hover:text-green-700 transition-colors">press@civicfund.us</a>
      </div>
      <div class="bg-gray-50 border border-gray-100 rounded-2xl p-6">
        <p class="text-sm font-medium text-gray-500 mb-1">Partnerships</p>
        <a href="mailto:partnerships@civicfund.us" class="text-gray-900 font-medium hover:text-green-700 transition-colors">partnerships@civicfund.us</a>
      </div> -->
    </div>

    <div class="border-t border-gray-100 pt-12">
      <h2 class="text-xl font-semibold text-gray-900 mb-6">Send a message</h2>
      <form onsubmit="return false;" class="space-y-5">
        <div class="grid sm:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">First name</label>
            <input type="text" placeholder="Jane" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Last name</label>
            <input type="text" placeholder="Smith" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input type="email" placeholder="jane@example.com" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Subject</label>
          <select class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors bg-white">
            <option value="">Select a topic</option>
            <option>General question</option>
            <option>Starting a project</option>
            <option>Worker onboarding</option>
            <option>Payment or billing</option>
            <option>Press inquiry</option>
            <option>Partnership</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Message</label>
          <textarea rows="5" placeholder="Tell us what's on your mind..." class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors resize-none"></textarea>
        </div>
        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-medium px-6 py-2.5 rounded-xl text-sm transition-colors">
          Send message
        </button>
        <p class="text-xs text-gray-400">This form is not yet connected. Email us directly at <a href="mailto:support@civicfund.us" class="text-green-600 hover:underline">support@civicfund.us</a> in the meantime.</p>
      </form>
    </div>

  </main>

  <footer class="border-t border-gray-100 mt-20 py-8 px-6 text-center text-sm text-gray-400">
    <p>© 2025 CivicFund · <a href="privacy.html" class="hover:text-gray-600 transition-colors">Privacy</a> · <a href="terms.html" class="hover:text-gray-600 transition-colors">Terms</a></p>
  </footer>

</body>
</html>
